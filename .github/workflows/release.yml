name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install . pyinstaller

      - name: Build
        run: >
          pyinstaller --noconfirm --onedir --windowed --name PPeek
          --icon packaging/ppeek.ico
          --add-data "ppeek/overlay/Overlay.qml;ppeek/overlay"
          --add-data "ppeek/assets;ppeek/assets"
          --add-data "packaging/ppeek.svg;packaging"
          --hidden-import PyQt6.QtSvg
          --exclude-module PyQt6.QtQml
          --exclude-module PyQt6.QtQuick
          main.py

      - name: Smoke test
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          $p = Start-Process -FilePath dist\PPeek\PPeek.exe -PassThru
          Start-Sleep -Seconds 12
          if ($p.HasExited) {
            Write-Host "app exited early with code $($p.ExitCode)"
            Get-ChildItem "$env:LOCALAPPDATA\PPeek" -ErrorAction SilentlyContinue |
              ForEach-Object { Write-Host "--- $($_.Name)"; Get-Content $_.FullName }
            exit 1
          }
          Get-Process PPeek -ErrorAction SilentlyContinue | Stop-Process -Force
          Get-ChildItem "$env:LOCALAPPDATA\PPeek" -ErrorAction SilentlyContinue |
            ForEach-Object { Write-Host "--- $($_.Name)"; Get-Content $_.FullName }

      - name: Bundle tosu
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo tosuapp/tosu --pattern "*windows*.zip" --output tosu.zip
          Expand-Archive tosu.zip -DestinationPath tosu-unpacked
          $exe = Get-ChildItem tosu-unpacked -Recurse -Filter tosu.exe | Select-Object -First 1
          Copy-Item $exe.FullName dist/PPeek/tosu.exe

      - name: Build Installer
        run: iscc packaging\installer.iss

      - name: Zip
        run: Compress-Archive -Path dist/PPeek -DestinationPath PPeek-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: PPeek-windows
          path: PPeek-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: PPeek-Installer
          path: dist/PPeek-Installer.exe

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            PPeek-windows.zip
            dist/PPeek-Installer.exe
