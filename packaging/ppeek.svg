<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22346b"/>
      <stop offset="1" stop-color="#0a0f26"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff6444"/>
      <stop offset="0.25" stop-color="#ffc832"/>
      <stop offset="0.5" stop-color="#64e664"/>
      <stop offset="0.75" stop-color="#50c8ff"/>
      <stop offset="1" stop-color="#c864ff"/>
    </linearGradient>
    <clipPath id="squircle">
      <rect x="0" y="0" width="256" height="256" rx="58"/>
    </clipPath>
  </defs>

  <g clip-path="url(#squircle)">
    <rect width="256" height="256" fill="url(#bg)"/>

    <!-- stars -->
    <circle cx="38" cy="44" r="3" fill="#ffffff" opacity="0.9"/>
    <circle cx="205" cy="30" r="2.2" fill="#ffffff" opacity="0.7"/>
    <circle cx="228" cy="96" r="2.6" fill="#ffffff" opacity="0.8"/>
    <circle cx="70" cy="20" r="1.8" fill="#ffffff" opacity="0.55"/>
    <circle cx="24" cy="118" r="2" fill="#ffffff" opacity="0.6"/>
    <circle cx="176" cy="66" r="1.8" fill="#ffffff" opacity="0.5"/>
    <!-- golden sparkles -->
    <path d="M186 118 l0 -13 M186 118 l0 13 M186 118 l-13 0 M186 118 l13 0"
          stroke="#ffdc50" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M58 84 l0 -9 M58 84 l0 9 M58 84 l-9 0 M58 84 l9 0"
          stroke="#ffdc50" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
    <!-- white diamond confetti -->
    <rect x="216" y="150" width="9" height="9" fill="#ffffff" opacity="0.75"
          transform="rotate(30 220.5 154.5)"/>
    <rect x="34" y="160" width="7" height="7" fill="#ffffff" opacity="0.6"
          transform="rotate(18 37.5 163.5)"/>

    <!-- ring, back half (behind planet) -->
    <g transform="translate(128 186) rotate(-16)">
      <path d="M -108 0 A 108 34 0 0 1 108 0" fill="none"
            stroke="url(#rainbow)" stroke-width="17" stroke-linecap="round" opacity="0.92"/>
    </g>

    <!-- blob planet peeking from the bottom -->
    <circle cx="128" cy="196" r="76" fill="#ffffff"/>

    <!-- peeking eyes -->
    <rect x="99" y="158" width="12" height="26" rx="6" fill="#101528"/>
    <rect x="145" y="158" width="12" height="26" rx="6" fill="#101528"/>
    <!-- eye highlights -->
    <circle cx="103.5" cy="163" r="2.6" fill="#ffffff"/>
    <circle cx="149.5" cy="163" r="2.6" fill="#ffffff"/>
    <!-- blush -->
    <ellipse cx="86" cy="186" rx="10" ry="6" fill="#ffb0c0" opacity="0.75"/>
    <ellipse cx="170" cy="186" rx="10" ry="6" fill="#ffb0c0" opacity="0.75"/>
    <!-- tiny mouth -->
    <path d="M 122 196 q 6 6 12 0" fill="none" stroke="#101528"
          stroke-width="4" stroke-linecap="round"/>

    <!-- ring, front half (over planet) -->
    <g transform="translate(128 186) rotate(-16)">
      <path d="M -108 0 A 108 34 0 0 0 108 0" fill="none"
            stroke="url(#rainbow)" stroke-width="17" stroke-linecap="round"/>
    </g>
  </g>
</svg>
